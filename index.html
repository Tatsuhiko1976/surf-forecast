<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>サーフ波予報 | 福島・茨城・千葉</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <style>
    :root {
      --bg:#0a0e1a; --surface:#111827; --surface2:#1e2a3a; --border:#2a3a4a;
      --text:#e8f0fe; --muted:#6b7a8d; --accent:#38bdf8;
      --green:#34d399; --yellow:#fbbf24; --orange:#f97316; --red:#f87171;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

    /* Header */
    .header{background:linear-gradient(135deg,#0a0e1a,#0c2340,#0a1628);border-bottom:1px solid var(--border);padding:14px 20px;position:sticky;top:0;z-index:200}
    .header-inner{max-width:960px;margin:0 auto;display:flex;align-items:center;justify-content:space-between}
    .header-title{display:flex;align-items:center;gap:10px}
    .header-title h1{font-size:1.15rem;font-weight:700;color:var(--accent)}
    .header-title small{font-size:.72rem;color:var(--muted);display:block}
    .header-right{display:flex;gap:8px;align-items:center}
    .btn{background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:6px 12px;border-radius:8px;cursor:pointer;font-size:.78rem;display:flex;align-items:center;gap:5px;transition:all .2s}
    .btn:hover{background:var(--border)}
    .btn.loading .spin{animation:spin 1s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}

    /* Board bar */
    .board-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:8px 20px}
    .board-bar-inner{max-width:960px;margin:0 auto;display:flex;align-items:center;gap:12px;font-size:.75rem;color:var(--muted)}
    .board-badge{background:linear-gradient(135deg,#1e3a5f,#0d2137);border:1px solid #2a5a8f;color:var(--accent);padding:3px 10px;border-radius:20px;font-weight:600;font-size:.72rem}

    /* Tabs */
    .tabs{background:var(--surface);border-bottom:1px solid var(--border);padding:0 20px;overflow-x:auto}
    .tabs-inner{max-width:960px;margin:0 auto;display:flex;gap:0}
    .tab{padding:11px 14px;cursor:pointer;font-size:.8rem;color:var(--muted);border-bottom:2px solid transparent;white-space:nowrap;transition:all .2s;user-select:none}
    .tab:hover{color:var(--text)}
    .tab.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:600}

    /* Main */
    .main{max-width:960px;margin:0 auto;padding:16px 20px}

    /* Date nav */
    .date-nav{display:flex;gap:6px;margin-bottom:16px;overflow-x:auto;padding-bottom:4px}
    .date-btn{background:var(--surface);border:1px solid var(--border);color:var(--muted);padding:7px 12px;border-radius:10px;cursor:pointer;font-size:.75rem;white-space:nowrap;transition:all .2s;text-align:center;min-width:52px}
    .date-btn:hover{border-color:var(--accent);color:var(--text)}
    .date-btn.active{background:var(--accent);border-color:var(--accent);color:#000;font-weight:700}
    .date-btn .day{font-size:.65rem;opacity:.8}

    /* Spot cards */
    .pref-label{font-size:.65rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;padding:10px 0 4px;margin-top:4px}
    .spots-grid{display:flex;flex-direction:column;gap:10px}
    .spot-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;transition:border-color .2s}
    .spot-card:hover{border-color:#3a5a7a}
    .spot-card.fav{border-color:#fbbf2450}

    .spot-card-header{display:flex;align-items:center;justify-content:space-between;padding:12px 14px 10px;cursor:pointer;gap:10px}
    .spot-left{display:flex;align-items:center;gap:10px;flex:1;min-width:0}
    .score-ring{width:50px;height:50px;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;font-weight:800;font-size:1.05rem;flex-shrink:0}
    .score-ring small{font-size:.48rem;font-weight:600;text-transform:uppercase;opacity:.8}
    .s-great{background:rgba(52,211,153,.15);color:#34d399;border:2px solid #34d399}
    .s-good{background:rgba(134,239,172,.1);color:#86efac;border:2px solid #86efac}
    .s-fair{background:rgba(251,191,36,.1);color:#fbbf24;border:2px solid #fbbf24}
    .s-poor{background:rgba(249,115,22,.1);color:#f97316;border:2px solid #f97316}
    .s-bad{background:rgba(248,113,113,.1);color:#f87171;border:2px solid #f87171}

    .spot-info{flex:1;min-width:0}
    .spot-name{font-size:.95rem;font-weight:700;display:flex;align-items:center;gap:6px}
    .spot-sub{font-size:.68rem;color:var(--muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .tags{display:flex;gap:5px;margin-top:6px;flex-wrap:wrap}
    .tag{font-size:.65rem;padding:2px 7px;border-radius:10px;font-weight:600;white-space:nowrap}
    .t-wave{background:rgba(56,189,248,.15);color:var(--accent)}
    .t-wind-off{background:rgba(52,211,153,.12);color:var(--green)}
    .t-wind-on{background:rgba(248,113,113,.12);color:var(--red)}
    .t-wind-cross{background:rgba(251,191,36,.1);color:var(--yellow)}
    .t-crowd-ok{background:rgba(52,211,153,.12);color:var(--green)}
    .t-crowd-mid{background:rgba(251,191,36,.1);color:var(--yellow)}
    .t-crowd-bad{background:rgba(248,113,113,.12);color:var(--red)}
    .t-tide{background:rgba(56,189,248,.08);color:#7dd3fc}

    .spot-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0}
    .wave-big{font-size:1.25rem;font-weight:800;color:var(--accent);line-height:1}
    .wave-big span{font-size:.65rem;color:var(--muted);font-weight:400}
    .score-label-sm{font-size:.65rem;color:var(--muted)}
    .star-btn{background:none;border:none;cursor:pointer;font-size:1rem;padding:2px;line-height:1;opacity:.5;transition:all .2s}
    .star-btn:hover,.star-btn.on{opacity:1}
    .chevron{color:var(--muted);font-size:.8rem;transition:transform .2s}
    .spot-card.open .chevron{transform:rotate(180deg)}

    /* Detail panel */
    .spot-detail{display:none;padding:0 14px 14px;border-top:1px solid var(--border)}
    .spot-card.open .spot-detail{display:block}

    .metrics-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-top:12px}
    @media(max-width:480px){.metrics-grid{grid-template-columns:repeat(2,1fr)}}
    .metric{background:var(--surface2);border-radius:10px;padding:9px;text-align:center}
    .metric-lbl{font-size:.6rem;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px}
    .metric-val{font-size:1rem;font-weight:700}
    .metric-unit{font-size:.6rem;color:var(--muted)}

    /* Score bars */
    .score-bars{margin-top:12px}
    .bars-title{font-size:.65rem;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
    .bar-row{display:flex;align-items:center;gap:8px;margin-bottom:5px}
    .bar-lbl{font-size:.68rem;color:var(--muted);width:56px;flex-shrink:0}
    .bar-track{flex:1;background:var(--border);border-radius:4px;height:5px;overflow:hidden}
    .bar-fill{height:100%;border-radius:4px;transition:width .5s ease}
    .bar-num{font-size:.68rem;font-weight:700;width:26px;text-align:right;flex-shrink:0}

    /* Tide section */
    .tide-section{margin-top:12px}
    .tide-title{font-size:.65rem;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
    .tide-chart-wrap{position:relative;background:var(--surface2);border-radius:10px;padding:8px 10px}
    .tide-svg{width:100%;height:50px;display:block}
    .tide-info-row{display:flex;gap:12px;margin-top:8px;font-size:.72rem}
    .tide-info-item{display:flex;flex-direction:column;gap:2px}
    .tide-info-lbl{color:var(--muted);font-size:.6rem}

    /* Hourly row */
    .hourly-section{margin-top:12px}
    .hourly-title{font-size:.65rem;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
    .hourly-scroll{overflow-x:auto;padding-bottom:4px}
    .hourly-row{display:flex;gap:5px;min-width:max-content}
    .h-cell{background:var(--surface2);border-radius:8px;padding:7px 8px;text-align:center;min-width:52px;border:1px solid transparent;cursor:default}
    .h-cell.best{border-color:var(--green);background:rgba(52,211,153,.08)}
    .h-time{font-size:.6rem;color:var(--muted)}
    .h-score{font-size:.85rem;font-weight:700;margin:2px 0}
    .h-wh{font-size:.6rem;color:var(--accent)}
    .c-great{color:#34d399}.c-good{color:#86efac}.c-fair{color:#fbbf24}.c-poor{color:#f97316}.c-bad{color:#f87171}

    /* Map */
    #mapView{display:none;position:relative}
    #mapContainer{height:calc(100vh - 220px);min-height:420px;border-radius:14px;overflow:hidden;border:1px solid var(--border)}
    .leaflet-container{background:#0a0e1a}
    .map-marker{border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;border:2px solid rgba(255,255,255,.8);box-shadow:0 2px 6px rgba(0,0,0,.5);cursor:pointer}
    /* Map detail bottom sheet */
    #mapDetail{position:absolute;bottom:0;left:0;right:0;background:var(--surface);border-top:2px solid var(--accent);border-radius:18px 18px 0 0;z-index:500;max-height:62%;overflow-y:auto;transform:translateY(100%);transition:transform .3s ease;pointer-events:none}
    #mapDetail.open{transform:translateY(0);pointer-events:auto}
    .map-detail-inner{padding:14px 16px 20px}

    /* Loading */
    .loading-overlay{display:flex;flex-direction:column;align-items:center;gap:14px;padding:60px 20px;color:var(--muted);font-size:.82rem}
    .wave-loader{display:flex;gap:5px;align-items:flex-end}
    .wave-loader span{width:7px;border-radius:4px;background:var(--accent);animation:wbar 1.2s ease-in-out infinite}
    .wave-loader span:nth-child(1){height:14px;animation-delay:0s}
    .wave-loader span:nth-child(2){height:22px;animation-delay:.1s}
    .wave-loader span:nth-child(3){height:30px;animation-delay:.2s}
    .wave-loader span:nth-child(4){height:22px;animation-delay:.3s}
    .wave-loader span:nth-child(5){height:14px;animation-delay:.4s}
    @keyframes wbar{0%,100%{transform:scaleY(.5);opacity:.4}50%{transform:scaleY(1);opacity:1}}

    /* Status / Legend */
    .status-bar{text-align:center;padding:8px;font-size:.7rem;color:var(--muted)}
    .status-bar.ok{color:var(--green)}.status-bar.err{color:var(--red)}
    .legend{display:flex;gap:12px;flex-wrap:wrap;padding:10px 0;font-size:.7rem;color:var(--muted);border-top:1px solid var(--border);margin-top:16px}
    .legend-item{display:flex;align-items:center;gap:5px}
    .ldot{width:7px;height:7px;border-radius:50%}

    /* AI Chat */
    #chatFab{position:fixed;bottom:24px;right:24px;width:54px;height:54px;border-radius:50%;background:linear-gradient(135deg,#0ea5e9,#3b82f6);border:none;color:#fff;font-size:1.35rem;cursor:pointer;box-shadow:0 4px 16px rgba(14,165,233,.45);z-index:1000;display:flex;align-items:center;justify-content:center;transition:transform .2s}
    #chatFab:hover{transform:scale(1.08)}
    #chatPanel{position:fixed;bottom:90px;right:20px;width:360px;max-width:calc(100vw - 32px);background:var(--surface);border:1px solid var(--border);border-radius:18px;box-shadow:0 8px 32px rgba(0,0,0,.5);z-index:999;display:none;flex-direction:column;max-height:calc(100vh - 120px);overflow:hidden}
    #chatPanel.open{display:flex}
    .chat-header{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
    .chat-header-title{font-size:.85rem;font-weight:700;display:flex;align-items:center;gap:8px;color:var(--accent)}
    .chat-close{background:none;border:none;color:var(--muted);cursor:pointer;font-size:1.1rem;padding:2px 4px}
    .chat-msgs{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:10px;min-height:0}
    .chat-bubble{padding:9px 13px;border-radius:14px;font-size:.82rem;line-height:1.55;max-width:88%;word-break:break-word;white-space:pre-wrap}
    .chat-bubble.user{background:linear-gradient(135deg,#0ea5e9,#3b82f6);color:#fff;align-self:flex-end;border-bottom-right-radius:4px}
    .chat-bubble.ai{background:var(--surface2);color:var(--text);align-self:flex-start;border-bottom-left-radius:4px}
    .chat-bubble.ai.streaming::after{content:'▌';animation:blink .6s step-end infinite;color:var(--accent)}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
    .chat-bubble.error{background:rgba(248,113,113,.1);color:var(--red)}
    .chat-presets{padding:8px 12px;display:flex;gap:6px;flex-wrap:wrap;border-top:1px solid var(--border)}
    .preset-chip{background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:20px;padding:5px 11px;font-size:.72rem;cursor:pointer;transition:all .2s;white-space:nowrap}
    .preset-chip:hover{border-color:var(--accent);color:var(--accent)}
    .chat-input-row{padding:10px 12px;border-top:1px solid var(--border);display:flex;gap:8px;align-items:center}
    #chatInput{flex:1;background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:10px;padding:8px 11px;font-size:.8rem;outline:none;resize:none;font-family:inherit;line-height:1.4}
    #chatInput:focus{border-color:var(--accent)}
    #chatSendBtn{background:linear-gradient(135deg,#0ea5e9,#3b82f6);border:none;color:#fff;border-radius:10px;width:36px;height:36px;cursor:pointer;font-size:1rem;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:opacity .2s}
    #chatSendBtn:disabled{opacity:.4;cursor:default}
  </style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <div class="header-title">
      <span style="font-size:1.5rem">🌊</span>
      <div>
        <h1>サーフ波予報</h1>
        <small>福島 · 茨城 · 千葉 — 7.0 ミッドレングス</small>
      </div>
    </div>
    <div class="header-right">
      <button class="btn" onclick="loadAll()"><span class="spin">↻</span> 更新</button>
    </div>
  </div>
</div>

<div class="board-bar">
  <div class="board-bar-inner">
    <span class="board-badge">🏄 7.0 ミッドレングス</span>
    <span>最適: 波高 0.5〜1.5m · 周期 8〜14s · オフショア</span>
  </div>
</div>

<div class="tabs">
  <div class="tabs-inner">
    <div class="tab active" data-view="all" onclick="setTab(this,'all')">全スポット</div>
    <div class="tab" data-view="fukushima" onclick="setTab(this,'fukushima')">福島県</div>
    <div class="tab" data-view="ibaraki" onclick="setTab(this,'ibaraki')">茨城県</div>
    <div class="tab" data-view="chiba" onclick="setTab(this,'chiba')">千葉県</div>
    <div class="tab" data-view="favorites" onclick="setTab(this,'favorites')">⭐ お気に入り</div>
    <div class="tab" data-view="map" onclick="setTab(this,'map')">🗺 地図</div>
  </div>
</div>

<div class="main">
  <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:10px">
    <div class="date-nav" id="dateNav" style="flex:1;margin-bottom:0"></div>
    <button class="btn" id="sortBtn" onclick="toggleSort()" style="flex-shrink:0;margin-top:0;align-self:center">
      <span>↕</span> <span id="sortLabel">スコア順</span>
    </button>
  </div>
  <div style="height:16px"></div>

  <div id="listView">
    <div class="loading-overlay">
      <div class="wave-loader"><span></span><span></span><span></span><span></span><span></span></div>
      <div>波データを取得中…</div>
    </div>
  </div>

  <div id="mapView">
    <div id="mapContainer"></div>
    <div id="mapDetail"></div>
  </div>

  <div class="status-bar" id="statusBar"></div>
  <div class="legend">
    <div class="legend-item"><div class="ldot" style="background:#34d399"></div>グレート 80+</div>
    <div class="legend-item"><div class="ldot" style="background:#86efac"></div>グッド 65-79</div>
    <div class="legend-item"><div class="ldot" style="background:#fbbf24"></div>フェア 45-64</div>
    <div class="legend-item"><div class="ldot" style="background:#f97316"></div>プア 25-44</div>
    <div class="legend-item"><div class="ldot" style="background:#f87171"></div>フラット 〜24</div>
    <div class="legend-item" style="margin-left:auto;color:var(--muted)">データ: Open-Meteo Marine API</div>
  </div>
</div>

<!-- AI Chat FAB + Panel -->
<button id="chatFab" onclick="toggleChat()" title="AIサーフアドバイザー">🤙</button>

<div id="chatPanel">
  <div class="chat-header">
    <div class="chat-header-title">🤖 AIサーフアドバイザー</div>
    <button class="chat-close" onclick="toggleChat()">✕</button>
  </div>
  <div class="chat-msgs" id="chatMsgs">
    <div class="chat-bubble ai">こんにちは！波予報について何でも聞いてください。例：「今日はどこのポイントが良さそう？」</div>
  </div>
  <div class="chat-presets" id="chatPresets">
    <div class="preset-chip" onclick="usePreset(this.textContent)">今日おすすめは？</div>
    <div class="preset-chip" onclick="usePreset(this.textContent)">この後どこが良くなる？</div>
    <div class="preset-chip" onclick="usePreset(this.textContent)">明日の波は？</div>
    <div class="preset-chip" onclick="usePreset(this.textContent)">風が良いのは？</div>
  </div>
  <div class="chat-input-row">
    <textarea id="chatInput" rows="1" placeholder="質問を入力…" onkeydown="chatKeydown(event)"></textarea>
    <button id="chatSendBtn" onclick="sendChat()">➤</button>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// ═══════════════════════════════════════════════════
// SPOTS
// ═══════════════════════════════════════════════════
const SPOTS = [

  { id:'isohara',     name:'磯原',        pref:'ibaraki', prefName:'茨城県',

  { id:'hitachi',     name:'日立',        pref:'ibaraki', prefName:'茨城県',

  { id:'ajigaura',    name:'阿字ヶ浦',    pref:'ibaraki', prefName:'茨城県',

  { id:'oarai',       name:'大洗',        pref:'ibaraki', prefName:'茨城県',

// ═══════════════════════════════════════════════════
// TIDE CALCULATION  (M2 + S2 constituents)
// Their beat creates the spring-neap cycle (~14.77 days)
// ═══════════════════════════════════════════════════
const M2_H = 12.4206;  // hours
const S2_H = 12.0000;

function tideAt(epochMs, spot) {
  const t = epochMs / 3_600_000; // hours since epoch
  const A  = spot.tideAmp || 0.55;
  const As = A * 0.35;
  const p  = spot.tideOfs || 2.0;
  return A  * Math.cos(2*Math.PI*(t - p) / M2_H)
       + As * Math.cos(2*Math.PI*(t - p*0.97) / S2_H);
}

function tideNorm(epochMs, spot) {
  const h = tideAt(epochMs, spot);
  const A = spot.tideAmp || 0.55;
  const maxH = A * 1.35;
  return Math.max(0, Math.min(1, (h + maxH) / (2 * maxH)));
}

function tideState(epochMs, spot) {
  const h0 = tideAt(epochMs, spot);
  const h1 = tideAt(epochMs + 20*60_000, spot);
  const norm = tideNorm(epochMs, spot);
  const rising = h1 > h0;
  const level = norm > .78 ? '満潮'
              : norm > .55 ? '上げ'
              : norm > .35 ? '中間'
              : norm > .18 ? '下げ' : '干潮';
  return { norm, rising, level, arrow: rising ? '↑' : '↓' };
}

// Find next high/low tide within next 13 hours
function nextTides(epochMs, spot) {
  const results = [];
  let prev = tideAt(epochMs, spot);
  for (let i = 1; i <= 26; i++) {
    const t = epochMs + i * 30 * 60_000;
    const cur = tideAt(t, spot);
    const next = tideAt(t + 30*60_000, spot);
    if (prev < cur && cur > next && results.length < 2) {
      results.push({ type:'満潮', time: new Date(t) });
    } else if (prev > cur && cur < next && results.length < 2) {
      results.push({ type:'干潮', time: new Date(t) });
    }
    prev = cur;
  }
  return results;
}

function tideCurvePoints(dateObj, spot) {
  const start = new Date(dateObj);
  start.setHours(0,0,0,0);
  return Array.from({length:49}, (_,i) => tideAt(start.getTime() + i*30*60_000, spot));
}

function renderTideSvg(points, spot, currentHourFrac) {
  const A = spot.tideAmp * 1.35;
  const W = 280, H = 48, PAD = 4;
  const toX = i => PAD + (i/(points.length-1))*(W-2*PAD);
  const toY = v => H/2 - (v/A)*(H/2-PAD);

  const pathD = points.map((v,i) => `${i?'L':'M'}${toX(i).toFixed(1)},${toY(v).toFixed(1)}`).join('');
  const fillD = pathD + ` L${toX(points.length-1)},${H} L${PAD},${H}Z`;
  const cx = (PAD + currentHourFrac/24*(W-2*PAD)).toFixed(1);
  const cyRaw = tideAt(new Date().getTime(), spot);
  const cy = toY(cyRaw).toFixed(1);

  return `<svg viewBox="0 0 ${W} ${H}" class="tide-svg">
    <defs>
      <linearGradient id="tg${spot.id}" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#38bdf8" stop-opacity=".25"/>
        <stop offset="100%" stop-color="#38bdf8" stop-opacity=".02"/>
      </linearGradient>
    </defs>
    <path d="${fillD}" fill="url(#tg${spot.id})"/>
    <path d="${pathD}" stroke="#38bdf8" stroke-width="1.5" fill="none"/>
    <line x1="${cx}" y1="2" x2="${cx}" y2="${H-2}" stroke="#fbbf24" stroke-width="1.5" stroke-dasharray="3,2" opacity=".8"/>
    <circle cx="${cx}" cy="${cy}" r="3" fill="#fbbf24"/>
  </svg>`;
}

// ═══════════════════════════════════════════════════
// SCORING (all return integers)
// ═══════════════════════════════════════════════════
function scoreWaveHeight(h) {
  let s;
  if (h < 0.20) s = 0;
  else if (h < 0.40) s = 10 + (h-.2)/.2*10;
  else if (h < 0.60) s = 20 + (h-.4)/.2*15;
  else if (h < 0.90) s = 35 + (h-.6)/.3*15;
  else if (h < 1.30) s = 50;
  else if (h < 1.80) s = 50 - (h-1.3)/.5*20;
  else if (h < 2.50) s = 30 - (h-1.8)/.7*20;
  else s = Math.max(0, 10-(h-2.5)*5);
  return Math.max(0, Math.min(50, Math.round(s)));
}

function scorePeriod(p) {
  let s;
  if (p < 4)       s = 0;
  else if (p < 6)  s = (p-4)/2*10;
  else if (p < 8)  s = 10+(p-6)/2*15;
  else if (p <=12) s = 25;
  else if (p <=16) s = 25-(p-12)/4*8;
  else             s = Math.max(0, 17-(p-16)*2);
  return Math.max(0, Math.min(25, Math.round(s)));
}

function scoreWind(spd, dir, facing) {
  const offDir = (facing+180)%360;
  let diff = Math.abs(dir - offDir);
  if (diff>180) diff = 360-diff;

  let dScore;
  if (diff < 45)       dScore = 1.0 - diff/45*0.25;
  else if (diff < 90)  dScore = 0.75 - (diff-45)/45*0.45;
  else                 dScore = Math.max(0, 0.30 - (diff-90)/90*0.30);

  const isOff = diff < 60;
  let sf;
  if (spd < 2)       sf = 0.85;
  else if (spd < 5)  sf = isOff ? 1.00 : 0.75;
  else if (spd < 8)  sf = isOff ? 0.90 : 0.45;
  else if (spd < 12) sf = isOff ? 0.70 : 0.15;
  else               sf = isOff ? 0.40 : 0.05;

  return Math.max(0, Math.min(25, Math.round(dScore*sf*25)));
}

function scoreCrowd(spot, dateObj, waveQuality) {
  const dow  = dateObj.getDay();
  const hour = dateObj.getHours();
  const mon  = dateObj.getMonth()+1;

  let base = dow===0||dow===6 ? 0.72 : dow===5 ? 0.50 : 0.30;
  const season = (mon>=7&&mon<=9) ? 1.4 : (mon>=3&&mon<=5) ? 1.1 : 1.0;
  const timeF  = hour<7 ? .25 : hour<10 ? .90 : hour<14 ? 1.20 : hour<17 ? 1.00 : .55;
  const waveF  = waveQuality>70 ? 1.35 : waveQuality>50 ? 1.15 : 0.80;
  const level  = Math.min(1, base*season*timeF*waveF);
  const score  = Math.max(0, Math.min(15, Math.round((1-level)*15)));

  return {
    score,
    level,
    label: level<.25?'ガラガラ':level<.45?'空いてる':level<.65?'普通':level<.80?'混んでる':'激混み',
    emoji: level<.25?'🏄':level<.45?'🟢':level<.65?'🟡':level<.80?'🟠':'🔴',
    cls:   level<.45?'t-crowd-ok':level<.75?'t-crowd-mid':'t-crowd-bad'
  };
}

function calcTotal(h,p,w,c) { return Math.min(100, h+p+w+c); }

function scoreClass(s) {
  return s>=80?'great':s>=65?'good':s>=45?'fair':s>=25?'poor':'bad';
}
function scoreLabel(s) {
  return s>=80?'グレート':s>=65?'グッド':s>=45?'フェア':s>=25?'プア':'フラット';
}

// ═══════════════════════════════════════════════════
// WIND HELPERS
// ═══════════════════════════════════════════════════
const WIND_DIR_JP=['北','北北東','北東','東北東','東','東南東','南東','南南東','南','南南西','南西','西南西','西','西北西','北西','北北西'];
const WIND_ARROWS=['↓','↓','↙','↙','←','↖','↖','↑','↑','↑','↗','↗','→','↘','↘','↓'];
function windIdx(deg){return Math.round(((deg%360)+360)%360/22.5)%16;}
function windJp(deg){return WIND_DIR_JP[windIdx(deg)];}
function windArrow(deg){return WIND_ARROWS[windIdx(deg)];}

function windLabel(dir, facing) {
  const off = (facing+180)%360;
  let d = Math.abs(dir-off); if(d>180) d=360-d;
  if(d<35)  return {text:'オフショア', cls:'t-wind-off'};
  if(d<65)  return {text:'クロスオフ', cls:'t-wind-off'};
  if(d<105) return {text:'クロスオン', cls:'t-wind-cross'};
  return       {text:'オンショア',  cls:'t-wind-on'};
}

// ═══════════════════════════════════════════════════
// API FETCH
// ═══════════════════════════════════════════════════
async function fetchSpot(spot) {
  const base = `latitude=${spot.lat}&longitude=${spot.lon}&timezone=Asia%2FTokyo&forecast_days=${FORECAST_DAYS}`;
  const [mr, wr] = await Promise.all([
    fetch(`https://marine-api.open-meteo.com/v1/marine?${base}&hourly=wave_height,wave_direction,wave_period,swell_wave_height,swell_wave_period,swell_wave_direction`),
    fetch(`https://api.open-meteo.com/v1/forecast?${base}&hourly=wind_speed_10m,wind_direction_10m,wind_gusts_10m`)
  ]);
  const [m, w] = await Promise.all([mr.json(), wr.json()]);

  return m.hourly.time.map((t,i) => {
    const wh  = m.hourly.wave_height[i]       ?? 0;
    const wp  = m.hourly.wave_period[i]       ?? 0;
    const wd  = m.hourly.wave_direction[i]    ?? 0;
    const sh  = m.hourly.swell_wave_height[i] ?? 0;
    const sp  = m.hourly.swell_wave_period[i] ?? 0;
    const ws  = w.hourly.wind_speed_10m[i]    ?? 0;
    const wdir= w.hourly.wind_direction_10m[i]?? 0;
    const wg  = w.hourly.wind_gusts_10m[i]    ?? 0;
    const date= new Date(t);

    const hs = scoreWaveHeight(wh);
    const ps = scorePeriod(wp);
    const ws2= scoreWind(ws, wdir, spot.facing);
    const crowd = scoreCrowd(spot, date, hs+ps+ws2);
    const total = calcTotal(hs, ps, ws2, crowd.score);

    return { time:t, date, waveHeight:wh, wavePeriod:wp, waveDir:wd,
             swellHeight:sh, swellPeriod:sp,
             windSpeed:ws, windDir:wdir, windGust:wg,
             hs, ps, ws:ws2, crowd, total };
  });
}

async function loadAll() {
  const btn = document.querySelector('.btn');
  btn.classList.add('loading');
  const sb = document.getElementById('statusBar');
  sb.className='status-bar'; sb.textContent='';

  try {
    const results = await Promise.all(SPOTS.map(s => fetchSpot(s).then(h=>({id:s.id,hours:h}))));
    results.forEach(r => { forecastData[r.id] = r.hours; });
    const now = new Date();
    sb.className='status-bar ok';
    sb.textContent=`更新: ${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')}`;
    render();
    if (currentView==='map') updateMapMarkers();
  } catch(e) {
    console.error(e);
    sb.className='status-bar err';
    sb.textContent='データ取得失敗。ネットワークを確認してください。';
  } finally {
    btn.classList.remove('loading');
  }
}

function updateMapMarkers() {
  if (!leafletMap) return;
  Object.values(mapMarkers).forEach(m=>m.remove());
  mapMarkers = {};

  SPOTS.forEach(spot => {
    const hours = getHoursForDate(spot.id, currentDateIdx);
    const rep = getRepHour(hours);
    const sc  = rep ? scoreClass(rep.total) : 'bad';
    const pts = rep ? rep.total : 0;
    const col = SCORE_COLORS[sc];

    const icon = L.divIcon({
      className:'',
      html:`<div class="map-marker" style="background:${col};color:#000;width:38px;height:38px">${pts}</div>`,
      iconSize:[38,38], iconAnchor:[19,19]
    });

    mapMarkers[spot.id] = L.marker([spot.lat, spot.lon], {icon})
      .addTo(leafletMap)
      .on('click', () => showMapDetail(spot.id));
  });
}

          </div>

        <button onclick="closeMapDetail()" style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:1.2rem;padding:4px;flex-shrink:0;margin-left:8px">✕</button>
      </div>

      <div class="hourly-section" style="margin-top:4px">
        <div class="hourly-title">時間別スコア</div>
        <div class="hourly-scroll"><div class="hourly-row">${hourCells}</div></div>
      </div>

      <div class="score-bars" style="margin-top:12px">
        <div class="bars-title">スコア内訳</div>
        ${mkBar('波高 /50', rep.hs, 50, hc)}
        ${mkBar('周期 /25', rep.ps, 25, pc)}
        ${mkBar('風　 /25', rep.ws, 25, wc)}
        ${mkBar('混雑 /15', rep.crowd.score, 15, cc2)}
      </div>
    </div>`;
  }
  panel.classList.add('open');
}

function closeMapDetail() {
  document.getElementById('mapDetail').classList.remove('open');
}

// ═══════════════════════════════════════════════════
// RENDER HELPERS
// ═══════════════════════════════════════════════════
function getHoursForDate(spotId, dateIdx) {
  const hours = forecastData[spotId];
  if (!hours) return [];
  const target = getDateList()[dateIdx];
  return hours.filter(h => target && isSameDay(h.date, target));
}

function getRepHour(hours) {
  if (!hours.length) return null;
  const morning = hours.find(h => h.date.getHours()===9);
  return morning || hours.reduce((b,h)=>h.total>b.total?h:b, hours[0]);
}

function getBestHour(hours) {
  if (!hours.length) return null;
  return hours.reduce((b,h)=>h.total>b.total?h:b, hours[0]);
}

function barColor(pct) {
  return pct>=80?'#34d399':pct>=65?'#86efac':pct>=45?'#fbbf24':pct>=25?'#f97316':'#f87171';
}

function mkBar(lbl, val, max, color) {
  const pct = Math.min(100, Math.round(val/max*100));
  return `<div class="bar-row">
    <div class="bar-lbl">${lbl}</div>
    <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${color}"></div></div>
    <div class="bar-num" style="color:${color}">${val}</div>
  </div>`;
}

// ═══════════════════════════════════════════════════
// RENDER SPOTS
// ═══════════════════════════════════════════════════
function render() {
  const container = document.getElementById('listView');
  if (!Object.keys(forecastData).length) {
    container.innerHTML=`<div class="loading-overlay"><div class="wave-loader"><span></span><span></span><span></span><span></span><span></span></div><div>波データを取得中…</div></div>`;
    return;
  }

  let list = currentView==='all'    ? [...SPOTS]
           : currentView==='favorites' ? SPOTS.filter(s=>favorites.has(s.id))
           : SPOTS.filter(s=>s.pref===currentView);

  if (currentView==='favorites' && !list.length) {
    container.innerHTML=`<div style="text-align:center;padding:60px 20px;color:var(--muted)">⭐ お気に入りスポットなし<br><small>各スポットの ☆ をタップして追加</small></div>`;
    return;
  }

  if (sortByScore) {
    list = [...list].sort((a,b) => {
      const ha = getHoursForDate(a.id, currentDateIdx);
      const hb = getHoursForDate(b.id, currentDateIdx);
      const sa = getRepHour(ha)?.total ?? 0;
      const sb = getRepHour(hb)?.total ?? 0;
      return sb - sa;
    });
  }

  let html = '<div class="spots-grid">';
  let lastPref = sortByScore ? null : '';

  list.forEach(spot => {
    if (!sortByScore && currentView==='all' && spot.prefName!==lastPref) {
      html += `<div class="pref-label">${spot.prefName}</div>`;
      lastPref = spot.prefName;
    }

    const hours = getHoursForDate(spot.id, currentDateIdx);
    const rep   = getRepHour(hours);
    const best  = getBestHour(hours);
    const isFav = favorites.has(spot.id);

    if (!rep) {
      html += `<div class="spot-card${isFav?' fav':''}" id="card-${spot.id}">
        <div class="spot-card-header">
          <div class="spot-left">
            <div class="score-ring s-bad"><span>--</span><small>pts</small></div>
            <div class="spot-info"><div class="spot-name">${spot.name}</div><div class="spot-sub">${spot.prefName} · ${spot.feature}</div></div>
          </div>
        </div></div>`;
      return;
    }

    const sc = scoreClass(rep.total);
    const wl = windLabel(rep.windDir, spot.facing);

    // Tide for rep hour
    const ts  = tideState(rep.date.getTime(), spot);
    const tideTag = `<span class="tag t-tide">🌊 ${ts.level} ${ts.arrow}</span>`;

    // Hourly cells
    const hourCells = hours.map(h => {
      const isBest = h===best;
      const cc = scoreClass(h.total);
      return `<div class="h-cell${isBest?' best':''}">
        <div class="h-time">${String(h.date.getHours()).padStart(2,'0')}:00</div>
        <div class="h-score c-${cc}">${h.total}</div>
        <div class="h-wh">${h.waveHeight.toFixed(1)}m</div>
      </div>`;
    }).join('');

    // Score bars
    const hc = barColor(rep.hs/50*100);
    const pc = barColor(rep.ps/25*100);
    const wc = barColor(rep.ws/25*100);
    const cc2= barColor(rep.crowd.score/15*100);

    // Tide section
    const tideCurve = tideCurvePoints(rep.date, spot);
    const tideH     = rep.date.getHours() + rep.date.getMinutes()/60;
    const tideSvg   = renderTideSvg(tideCurve, spot, tideH);
    const nextT     = nextTides(rep.date.getTime(), spot);
    const nextTHTML = nextT.map(t=>`<div class="tide-info-item"><div class="tide-info-lbl">${t.type}</div><div>${t.time.getHours()}:${String(t.time.getMinutes()).padStart(2,'0')}</div></div>`).join('');

    html += `
    <div class="spot-card${isFav?' fav':''}" id="card-${spot.id}">
      <div class="spot-card-header" onclick="toggleCard('${spot.id}')">
        <div class="spot-left">
          <div class="score-ring s-${sc}">${rep.total}<small>pts</small></div>
          <div class="spot-info">
            <div class="spot-name">
              ${spot.name}
              <button class="star-btn${isFav?' on':''}" onclick="event.stopPropagation();toggleFav('${spot.id}',this)">${isFav?'⭐':'☆'}</button>
            </div>
            <div class="spot-sub">${spot.prefName} · ${spot.feature}</div>
            <div class="tags">
              <span class="tag t-wave">🌊 ${rep.waveHeight.toFixed(1)}m</span>
              <span class="tag t-wave">⏱ ${rep.wavePeriod.toFixed(0)}s</span>
              <span class="tag ${wl.cls}">${windArrow(rep.windDir)} ${wl.text}</span>
              <span class="tag ${rep.crowd.cls}">${rep.crowd.emoji} ${rep.crowd.label}</span>
              ${tideTag}
            </div>
          </div>
        </div>
        <div class="spot-right">
          <div class="wave-big">${rep.waveHeight.toFixed(1)}<span>m</span></div>
          <div class="score-label-sm">${scoreLabel(rep.total)}</div>
          <div class="chevron">▼</div>
        </div>
      </div>

      <div class="spot-detail" id="det-${spot.id}">
        <div class="metrics-grid">
          <div class="metric"><div class="metric-lbl">波高</div><div class="metric-val" style="color:var(--accent)">${rep.waveHeight.toFixed(1)}<span class="metric-unit">m</span></div></div>
          <div class="metric"><div class="metric-lbl">周期</div><div class="metric-val" style="color:var(--green)">${rep.wavePeriod.toFixed(0)}<span class="metric-unit">s</span></div></div>
          <div class="metric"><div class="metric-lbl">風速</div><div class="metric-val" style="color:var(--yellow)">${rep.windSpeed.toFixed(1)}<span class="metric-unit">m/s</span></div></div>
          <div class="metric"><div class="metric-lbl">風向</div><div class="metric-val" style="font-size:.85rem">${windArrow(rep.windDir)} ${windJp(rep.windDir)}</div></div>
          <div class="metric"><div class="metric-lbl">うねり高</div><div class="metric-val" style="color:var(--accent)">${rep.swellHeight.toFixed(1)}<span class="metric-unit">m</span></div></div>
          <div class="metric"><div class="metric-lbl">うねり周期</div><div class="metric-val" style="color:var(--green)">${rep.swellPeriod.toFixed(0)}<span class="metric-unit">s</span></div></div>
        </div>

        <div class="score-bars">
          <div class="bars-title">スコア内訳（7.0ミッドレングス基準 / 100点満点）</div>
          ${mkBar('波高 /50', rep.hs, 50, hc)}
          ${mkBar('周期 /25', rep.ps, 25, pc)}
          ${mkBar('風　 /25', rep.ws, 25, wc)}
          ${mkBar('混雑 /15', rep.crowd.score, 15, cc2)}
        </div>

        <div class="tide-section">
          <div class="tide-title">潮汐（本日24時間）</div>
          <div class="tide-chart-wrap">
            ${tideSvg}
            <div class="tide-info-row">
              <div class="tide-info-item"><div class="tide-info-lbl">現在の潮位</div><div>${ts.level} ${ts.arrow} (${Math.round(ts.norm*100)}%)</div></div>
              ${nextTHTML}
            </div>
          </div>
        </div>

        <div class="hourly-section">
          <div class="hourly-title">時間別スコア — ★ = ベスト</div>
          <div class="hourly-scroll"><div class="hourly-row">${hourCells}</div></div>
        </div>

        ${best?`<div style="margin-top:8px;font-size:.72rem;color:var(--muted)">
          ★ ベスト: <strong style="color:#34d399">${String(best.date.getHours()).padStart(2,'0')}:00</strong>
          スコア <strong style="color:#34d399">${best.total}</strong>pts
          （波 ${best.waveHeight.toFixed(1)}m / 周期 ${best.wavePeriod.toFixed(0)}s）
        </div>`:''}
      </div>
    </div>`;
  });

  html += '</div>';
  container.innerHTML = html;
}

function toggleSort() {
  sortByScore = !sortByScore;
  const btn = document.getElementById('sortBtn');
  const lbl = document.getElementById('sortLabel');
  if (sortByScore) {
    btn.style.color = 'var(--accent)';
    btn.style.borderColor = 'var(--accent)';
    lbl.textContent = 'スコア順 ✓';
  } else {
    btn.style.color = '';
    btn.style.borderColor = '';
    lbl.textContent = 'スコア順';
  }
  render();
}

function toggleCard(id) {
  const card = document.getElementById('card-'+id);
  card.classList.toggle('open');
}

// ═══════════════════════════════════════════════════
// TAB / VIEW
// ═══════════════════════════════════════════════════
function setTab(el, view) {
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  currentView = view;

  const lv = document.getElementById('listView');
  const mv = document.getElementById('mapView');

  if (view==='map') {
    lv.style.display='none';
    mv.style.display='block';
    initMap();
    if (Object.keys(forecastData).length) updateMapMarkers();
  } else {
    lv.style.display='';
    mv.style.display='none';
    render();
  }
}

// ═══════════════════════════════════════════════════
// DATE NAV
// ═══════════════════════════════════════════════════
function renderDateNav() {
  const nav = document.getElementById('dateNav');
  nav.innerHTML = getDateList().map((d,i) => {
    const label = i===0?'今日':i===1?'明日':`${d.getMonth()+1}/${d.getDate()}`;
    const day   = DAYS_JP[d.getDay()];
    return `<div class="date-btn${i===currentDateIdx?' active':''}" onclick="selectDate(${i})">
      <div>${label}</div><div class="day">${day}</div>
    </div>`;
  }).join('');
}

function selectDate(idx) {
  currentDateIdx = idx;
  ctxSent = false;  // re-send forecast context for new date
  renderDateNav();
  if (currentView==='map') updateMapMarkers();
  else render();
}

// ═══════════════════════════════════════════════════
// AI CHAT
// ═══════════════════════════════════════════════════
let chatHistory = [];
let chatOpen = false;
let chatStreaming = false;
let ctxSent = false;  // forecast context sent in first message only

function toggleChat() {
  chatOpen = !chatOpen;
  const panel = document.getElementById('chatPanel');
  panel.classList.toggle('open', chatOpen);
  if (chatOpen) {
    document.getElementById('chatInput').focus();
  }
}

function usePreset(text) {
  document.getElementById('chatInput').value = text;
  sendChat();
}

function chatKeydown(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendChat();
  }
}

function buildChatCtx() {
  const lines = ['=== 波予報サマリー ==='];
  const dateList = getDateList();

  SPOTS.forEach(spot => {
    const hours = getHoursForDate(spot.id, currentDateIdx);
    const rep = getRepHour(hours);
    const best = getBestHour(hours);
    if (!rep) return;

    const sc = scoreClass(rep.total);
    const scLabel = {great:'グレート',good:'グッド',fair:'フェア',poor:'プア',bad:'フラット'}[sc] || sc;
    lines.push(
      `【${spot.prefName} ${spot.name}】スコア:${rep.total}pts(${scLabel}) ` +
      `波高:${rep.waveHeight.toFixed(1)}m 周期:${rep.wavePeriod.toFixed(0)}s ` +
      `風:${rep.windSpeed.toFixed(0)}m/s ${rep.windDir}方向 ` +
      `最高スコア:${best.total}pts(${best.date.getHours()}時頃)`
    );
  });

  const dateLabel = currentDateIdx===0?'今日':currentDateIdx===1?'明日':
    `${dateList[currentDateIdx].getMonth()+1}月${dateList[currentDateIdx].getDate()}日`;
  lines.unshift(`対象日: ${dateLabel}`);
  return lines.join('\n');
}

async function sendChat() {
  if (chatStreaming) return;
  const input = document.getElementById('chatInput');
  const message = input.value.trim();
  if (!message) return;

  input.value = '';
  input.style.height = '';

  // Show user bubble
  const msgsEl = document.getElementById('chatMsgs');
  const userBubble = document.createElement('div');
  userBubble.className = 'chat-bubble user';
  userBubble.textContent = message;
  msgsEl.appendChild(userBubble);

  // AI bubble (streaming)
  const aiBubble = document.createElement('div');
  aiBubble.className = 'chat-bubble ai streaming';
  aiBubble.textContent = '';
  msgsEl.appendChild(aiBubble);
  msgsEl.scrollTop = msgsEl.scrollHeight;

  // Disable send
  chatStreaming = true;
  document.getElementById('chatSendBtn').disabled = true;
  document.getElementById('chatPresets').style.opacity = '0.4';

  // Context only in first message
  const context = ctxSent ? '' : buildChatCtx();
  ctxSent = true;

  // Build payload
  const payload = {
    message,
    context,
    history: chatHistory.slice()
  };

  let fullText = '';

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify(payload)
    });

    if (!res.ok) throw new Error(`HTTP ${res.status}`);

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buf = '';

    while (true) {
      const {done, value} = await reader.read();
      if (done) break;
      buf += decoder.decode(value, {stream: true});

      const parts = buf.split('\n\n');
      buf = parts.pop();

      for (const part of parts) {
        const line = part.trim();
        if (!line.startsWith('data:')) continue;
        const data = line.slice(5).trim();
        if (data === '[DONE]') continue;
        try {
          const obj = JSON.parse(data);
          if (obj.error) {
            aiBubble.textContent = obj.error;
            aiBubble.classList.add('error');
            fullText = '';
          } else if (obj.text) {
            fullText += obj.text;
            aiBubble.textContent = fullText;
          }
        } catch (_) { /* skip malformed */ }
        msgsEl.scrollTop = msgsEl.scrollHeight;
      }
    }
  } catch (e) {
    aiBubble.textContent = 'エラーが発生しました。サーバーが起動しているか確認してください。';
    aiBubble.classList.add('error');
  }

  aiBubble.classList.remove('streaming');

  // Update history (keep last 8 exchanges = 16 messages)
  if (fullText) {
    chatHistory.push({role:'user', content: message});
    chatHistory.push({role:'assistant', content: fullText});
    if (chatHistory.length > 16) chatHistory = chatHistory.slice(-16);
  }

  chatStreaming = false;
  document.getElementById('chatSendBtn').disabled = false;
  document.getElementById('chatPresets').style.opacity = '';
  msgsEl.scrollTop = msgsEl.scrollHeight;
}
